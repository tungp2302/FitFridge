{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Add Food to your Fridge{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="product_id">Product ID</label>
    <input name="product_id" id="title" value="{{ request.form['product_id'] }}" required>
    <label for="amount">Amount</label>
    <input type="number" name="amount" id="title" value="{{ request.form['amount'] }}" required>
    <label for="unit">Unit</label>
    <input type="number" name="unit" id="title" value="{{ request.form['unit'] }}" required>
    <input type="submit" value="Save">
  </form>
{% endblock %}
