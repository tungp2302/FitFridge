{% extends "base.html" %}
{% block title %}Forecast{% endblock %}
{% block content %}
<div class="container mt-3">
  <h1>Consumption Forecast</h1>
  <button id="run" class="btn">Generate Forecast</button>
  <pre id="out" style="white-space:pre-wrap; background:#f7f7f7;padding:1rem;margin-top:.5rem;"></pre>
</div>
<script>
document.getElementById('run').addEventListener('click', async () => {
  const res = await fetch('/asaai/forecast');
  const j = await res.json();
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
});
</script>
{% endblock %}
