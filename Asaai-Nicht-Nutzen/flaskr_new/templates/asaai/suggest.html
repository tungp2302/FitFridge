{% extends "base.html" %}
{% block title %}Recipe Suggest{% endblock %}
{% block content %}
<div class="container mt-3">
  <h1>Recipe Suggestions</h1>
  <label>Daily protein (g): <input id="protein" type="number" value="30"></label>
  <label>Daily kcal: <input id="kcal" type="number" value="2000"></label>
  <button id="run" class="btn">Get Suggestions</button>
  <pre id="out" style="white-space:pre-wrap; background:#f7f7f7;padding:1rem;margin-top:.5rem;"></pre>
</div>
<script>
document.getElementById('run').addEventListener('click', async () => {
  const protein = document.getElementById('protein').value;
  const kcal = document.getElementById('kcal').value;
  const res = await fetch('/asaai/recipes/suggest', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({daily_goal: {protein: Number(protein), kcal: Number(kcal)}})
  });
  const j = await res.json();
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
});
</script>
{% endblock %}
