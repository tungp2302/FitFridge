{% extends "base.html" %}
{% block title %}Recipe Matcher{% endblock %}
{% block content %}
<div class="container mt-3">
  <h1>Recipe Matcher (match-only)</h1>
  <button id="run" class="btn">Run Matcher</button>
  <pre id="out" style="white-space:pre-wrap; background:#f7f7f7;padding:1rem;margin-top:.5rem;"></pre>
</div>
<script>
document.getElementById('run').addEventListener('click', async () => {
  const r = await fetch('/asaai/recipes/match-only');
  const j = await r.json();
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
});
</script>
{% endblock %}
