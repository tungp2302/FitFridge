{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Edit "{{ post['name'] }}"{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="name">Name</label>
    <input name="name" id="name" value="{{ request.form.get('name', post['name']) }}" required>

    <label for="brand">Brand</label>
    <input name="brand" id="brand" value="{{ request.form.get('brand', post['brand']) }}">

    <label for="barcode">Barcode</label>
    <input name="barcode" id="barcode" value="{{ request.form.get('barcode', post['barcode']) }}">

    <label for="current_amount">Amount</label>
    <input name="current_amount" id="current_amount" value="{{ request.form.get('current_amount', post['current_amount']) }}">

    <label for="unit">Unit</label>
    <input name="unit" id="unit" value="{{ request.form.get('unit', post['unit']) }}">
    <input type="submit" value="Save">
  </form>
  <hr>
  <form action="{{ url_for('frontend.delete_product', item_id=post['id']) }}" method="post">
    <input class="danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
  </form>
{% endblock %}
