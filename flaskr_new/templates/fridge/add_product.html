{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}New Food{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="name">Name</label>
    <input name="name" id="name" value="{{ request.form.get('name', '') }}" required>

    <label for="brand">Brand</label>
    <input name="brand" id="brand" value="{{ request.form.get('brand', '') }}">

    <label for="barcode">Barcode</label>
    <input name="barcode" id="barcode" value="{{ request.form.get('barcode', '') }}">

    <label for="current_amount">Amount</label>
    <input name="current_amount" id="current_amount" value="{{ request.form.get('current_amount', '100') }}">

    <label for="unit">Unit</label>
    <input name="unit" id="unit" value="{{ request.form.get('unit', 'g') }}">

    <input type="submit" value="Save">
  </form>
{% endblock %}
