{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}New Food{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="query">Barcode or product name</label>
    <input
      name="query"
      id="query"
      value="{{ request.form.get('query', '') }}"
      placeholder="e.g. 3017620422003 or Nutella"
      required
    >
    <p class="body">Nutrition values and package amount are fetched automatically from OpenFoodFacts.</p>

    <input type="submit" value="Save">
  </form>
{% endblock %}
