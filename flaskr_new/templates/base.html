<!doctype html>
<title>{% block title %}FitFridge{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <div id="logo">
  <h1>FitFridge</h1>
  </div>
  <nav>
  <div id="menubar">
      <div id="menuleft">
        <a href="{{ url_for('frontend.dashboard') }}">Kühlschrank</a>
        <a href="{{ url_for('frontend.meal_tracker') }}">Mahlzeiten-Tracker</a>
        <a href="{{ url_for('asaai.planner_ui') }}">Rezeptplaner</a>
        <a href="{{ url_for('frontend.settings') }}">Einstellungen</a>
      </div>
  <div id="usermenu">
    {% if g.user %}
    <a href="{{ url_for('frontend.logout') }}">Log Out</a>
    <a href="{{ url_for('frontend.dashboard')}}">{{ g.user['username'] }}</a>
      {% else %}
      <a href="{{ url_for('frontend.register') }}">Register</a>
      <a href="{{ url_for('frontend.login') }}">Log In</a>
      {% endif %} 
  </div>
</div>
</nav>
<section class="content">
  <header>
    {% block header %}{% endblock %}
  </header>
  {% for message in get_flashed_messages() %}
  <div class="flash">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</section>
