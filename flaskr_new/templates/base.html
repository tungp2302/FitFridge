<!doctype html>
<title>{% block title %}{% endblock %} - FitFridge</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<nav>
  <div id="logo">
  <h1>FitFridge</h1>
  </div>
  <div id="menubar">
      <div id="menuleft">
      <a href="{{url_for('frontend.dashboard')}}">Dashboard</a>
      <a href="{{url_for('frontend.add_product')}}">Add Product</a>
      </div>
  <div id="usermenu">
    {% if g.user %}
    <a href="{{ url_for('frontend.logout') }}">Log Out</a>
    <a href="{{ url_for('frontend.dashboard')}}">{{ g.user['username'] }}</a>
      {% else %}
      <a href="{{ url_for('frontend.register') }}">Register</a>
      <a href="{{ url_for('frontend.login') }}">Log In</a>
      {% endif %} 
  </div>
</div>
</nav>
<section class="content">
  <header>
    {% block header %}{% endblock %}
  </header>
  {% for message in get_flashed_messages() %}
  <div class="flash">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</section>
